kind = "web"
previewPath = "/"
title = "Insurance Broker Dashboard"
version = "1.0.0"
id = "artifacts/insurance-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25203

[services.development]
run = "pnpm --filter @workspace/insurance-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/insurance-dashboard", "run", "build" ]
publicDir = "artifacts/insurance-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25203"
BASE_PATH = "/"
