openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: openai
    description: OpenAI AI chat operations
  - name: dashboard
    description: Dashboard data endpoints
  - name: config
    description: Tenant configuration
  - name: workspaces
    description: Analytics workspaces (one per business question / dataset bundle)
  - name: settings
    description: Per-user settings
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiConversation"
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOpenaiConversationBody"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"
  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [openai]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiMessage"
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a text message and receive a streaming text response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendOpenaiMessageBody"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}
  /dashboard/executive:
    get:
      operationId: getExecutiveSummary
      tags: [dashboard]
      summary: Get executive summary KPIs
      responses:
        "200":
          description: Executive summary data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutiveSummary"
  /dashboard/sales:
    get:
      operationId: getSalesPerformance
      tags: [dashboard]
      summary: Get sales pipeline and placement analytics
      responses:
        "200":
          description: Sales performance data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesPerformance"
  /dashboard/products:
    get:
      operationId: getProductAnalytics
      tags: [dashboard]
      summary: Get line of business and product analytics
      responses:
        "200":
          description: Product analytics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductAnalytics"
  /dashboard/renewals:
    get:
      operationId: getRenewalsRetention
      tags: [dashboard]
      summary: Get renewals and retention metrics
      responses:
        "200":
          description: Renewals and retention data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RenewalsRetention"
  /dashboard/claims:
    get:
      operationId: getClaimsRisk
      tags: [dashboard]
      summary: Get claims and risk analytics
      responses:
        "200":
          description: Claims and risk data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimsRisk"
  /dashboard/geography:
    get:
      operationId: getGeographyData
      tags: [dashboard]
      summary: Get US geographic performance data for heat map
      responses:
        "200":
          description: Geographic data by state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeographyData"
  /config:
    get:
      operationId: getTenantConfig
      tags: [config]
      summary: Get active tenant configuration for the frontend
      responses:
        "200":
          description: Tenant configuration including branding, sections, prompts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantClientConfig"
  /workspaces:
    get:
      operationId: listWorkspaces
      tags: [workspaces]
      summary: List all workspaces
      responses:
        "200":
          description: List of workspaces
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Workspace"
    post:
      operationId: createWorkspace
      tags: [workspaces]
      summary: Create a new workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceBody"
      responses:
        "201":
          description: Created workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
  /workspaces/{id}:
    get:
      operationId: getWorkspace
      tags: [workspaces]
      summary: Get a workspace by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Workspace detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get user settings (auto-creates default row if missing)
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    patch:
      operationId: updateSettings
      tags: [settings]
      summary: Patch user settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSettingsBody"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
  /dashboard/{sectionId}:
    get:
      operationId: getDashboardSection
      tags: [dashboard]
      summary: Get data for a specific dashboard section by config-driven section ID
      parameters:
        - name: sectionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Section data (shape varies by tenant and section)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "404":
          description: Section not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    OpenaiConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt
    OpenaiMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt
    CreateOpenaiConversationBody:
      type: object
      properties:
        title:
          type: string
      required:
        - title
    SendOpenaiMessageBody:
      type: object
      properties:
        content:
          type: string
      required:
        - content
    OpenaiConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/OpenaiMessage"
      required:
        - id
        - title
        - createdAt
        - messages
    OpenaiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    TrendPoint:
      type: object
      properties:
        date:
          type: string
        value:
          type: number
      required:
        - date
        - value
    YoyComparison:
      type: object
      properties:
        current:
          type: number
        previous:
          type: number
        changePercent:
          type: number
      required:
        - current
        - previous
        - changePercent
    ExecutiveSummary:
      type: object
      properties:
        writtenPremium:
          $ref: "#/components/schemas/YoyComparison"
        commissionRevenue:
          $ref: "#/components/schemas/YoyComparison"
        policiesBound:
          $ref: "#/components/schemas/YoyComparison"
        renewalRate:
          type: number
        quoteToBind:
          type: number
        yoyBookGrowth:
          type: number
        avgPremiumPerPolicy:
          type: number
        retentionRate:
          type: number
        lossRatio:
          type: number
        topStatesByPremium:
          type: array
          items:
            type: object
            properties:
              state:
                type: string
              stateCode:
                type: string
              premium:
                type: number
            required:
              - state
              - stateCode
              - premium
        monthlyPremiumTrend:
          type: array
          items:
            $ref: "#/components/schemas/TrendPoint"
        monthlyCommissionTrend:
          type: array
          items:
            $ref: "#/components/schemas/TrendPoint"
        policyMix:
          type: array
          items:
            type: object
            properties:
              line:
                type: string
              premium:
                type: number
              share:
                type: number
            required:
              - line
              - premium
              - share
      required:
        - writtenPremium
        - commissionRevenue
        - policiesBound
        - renewalRate
        - quoteToBind
        - yoyBookGrowth
        - avgPremiumPerPolicy
        - retentionRate
        - lossRatio
        - topStatesByPremium
        - monthlyPremiumTrend
        - monthlyCommissionTrend
        - policyMix
    ProducerMetric:
      type: object
      properties:
        name:
          type: string
        writtenPremium:
          type: number
        commissionRevenue:
          type: number
        quoteRate:
          type: number
        bindRate:
          type: number
        renewalRetention:
          type: number
        avgAccountSize:
          type: number
        policiesBound:
          type: integer
      required:
        - name
        - writtenPremium
        - commissionRevenue
        - quoteRate
        - bindRate
        - renewalRetention
        - avgAccountSize
        - policiesBound
    SalesPerformance:
      type: object
      properties:
        leadVolume:
          type: integer
        qualifiedLeadRatio:
          type: number
        quotesIssued:
          type: integer
        quoteRate:
          type: number
        bindRate:
          type: number
        closingRatio:
          type: number
        premiumBound:
          type: number
        avgDaysToBind:
          type: number
        newBusinessPremium:
          type: number
        renewalPremium:
          type: number
        funnelStages:
          type: array
          items:
            type: object
            properties:
              stage:
                type: string
              count:
                type: integer
              value:
                type: number
            required:
              - stage
              - count
              - value
        producerLeaderboard:
          type: array
          items:
            $ref: "#/components/schemas/ProducerMetric"
        monthlyBindTrend:
          type: array
          items:
            $ref: "#/components/schemas/TrendPoint"
        accountSizeBuckets:
          type: array
          items:
            type: object
            properties:
              bucket:
                type: string
              count:
                type: integer
              premium:
                type: number
            required:
              - bucket
              - count
              - premium
      required:
        - leadVolume
        - qualifiedLeadRatio
        - quotesIssued
        - quoteRate
        - bindRate
        - closingRatio
        - premiumBound
        - avgDaysToBind
        - newBusinessPremium
        - renewalPremium
        - funnelStages
        - producerLeaderboard
        - monthlyBindTrend
        - accountSizeBuckets
    LineOfBusiness:
      type: object
      properties:
        line:
          type: string
        premium2023:
          type: number
        premium2022:
          type: number
        yoyChange:
          type: number
        policyCount:
          type: integer
        avgPolicySize:
          type: number
        bindRate:
          type: number
        renewalRate:
          type: number
        lossRatio:
          type: number
        commissionRevenue:
          type: number
      required:
        - line
        - premium2023
        - premium2022
        - yoyChange
        - policyCount
        - avgPolicySize
        - bindRate
        - renewalRate
        - lossRatio
        - commissionRevenue
    CarrierMetric:
      type: object
      properties:
        carrier:
          type: string
        premiumPlaced:
          type: number
        submissions:
          type: integer
        bindRatio:
          type: number
        avgQuoteTurnaround:
          type: number
        retentionRate:
          type: number
        lossRatio:
          type: number
        commissionRate:
          type: number
      required:
        - carrier
        - premiumPlaced
        - submissions
        - bindRatio
        - avgQuoteTurnaround
        - retentionRate
        - lossRatio
        - commissionRate
    ProductAnalytics:
      type: object
      properties:
        lineOfBusiness:
          type: array
          items:
            $ref: "#/components/schemas/LineOfBusiness"
        carriers:
          type: array
          items:
            $ref: "#/components/schemas/CarrierMetric"
        premiumByLineTrend:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
              commercialProperty:
                type: number
              generalLiability:
                type: number
              commercialAuto:
                type: number
              workersComp:
                type: number
              cyber:
                type: number
            required:
              - date
              - commercialProperty
              - generalLiability
              - commercialAuto
              - workersComp
              - cyber
      required:
        - lineOfBusiness
        - carriers
        - premiumByLineTrend
    RenewalsRetention:
      type: object
      properties:
        renewalRate:
          type: number
        retentionRatio:
          type: number
        retainedPremium:
          type: number
        lostPremium:
          type: number
        premiumAtRisk30:
          type: number
        premiumAtRisk60:
          type: number
        premiumAtRisk90:
          type: number
        nonRenewalCount:
          type: integer
        remarketingSuccessRate:
          type: number
        churnByProducer:
          type: array
          items:
            type: object
            properties:
              producer:
                type: string
              lostPolicies:
                type: integer
              lostPremium:
                type: number
              retentionRate:
                type: number
            required:
              - producer
              - lostPolicies
              - lostPremium
              - retentionRate
        churnByLine:
          type: array
          items:
            type: object
            properties:
              line:
                type: string
              lostPolicies:
                type: integer
              lostPremium:
                type: number
              retentionRate:
                type: number
            required:
              - line
              - lostPolicies
              - lostPremium
              - retentionRate
        renewalTrend:
          type: array
          items:
            $ref: "#/components/schemas/TrendPoint"
        retentionTrend:
          type: array
          items:
            $ref: "#/components/schemas/TrendPoint"
      required:
        - renewalRate
        - retentionRatio
        - retainedPremium
        - lostPremium
        - premiumAtRisk30
        - premiumAtRisk60
        - premiumAtRisk90
        - nonRenewalCount
        - remarketingSuccessRate
        - churnByProducer
        - churnByLine
        - renewalTrend
        - retentionTrend
    ClaimsRisk:
      type: object
      properties:
        openClaims:
          type: integer
        closedClaims:
          type: integer
        claimFrequency:
          type: number
        avgIncurredLoss:
          type: number
        severity:
          type: number
        lossRatio:
          type: number
        claimsByLine:
          type: array
          items:
            type: object
            properties:
              line:
                type: string
              claims:
                type: integer
              incurredLoss:
                type: number
              lossRatio:
                type: number
            required:
              - line
              - claims
              - incurredLoss
              - lossRatio
        claimsByState:
          type: array
          items:
            type: object
            properties:
              state:
                type: string
              stateCode:
                type: string
              claims:
                type: integer
              incurredLoss:
                type: number
            required:
              - state
              - stateCode
              - claims
              - incurredLoss
        claimsTrend:
          type: array
          items:
            $ref: "#/components/schemas/TrendPoint"
        lossRatioTrend:
          type: array
          items:
            $ref: "#/components/schemas/TrendPoint"
        recentClaims:
          type: array
          items:
            type: object
            properties:
              claimId:
                type: string
              policyLine:
                type: string
              state:
                type: string
              incurredLoss:
                type: number
              status:
                type: string
              filedDate:
                type: string
              severity:
                type: string
            required:
              - claimId
              - policyLine
              - state
              - incurredLoss
              - status
              - filedDate
              - severity
      required:
        - openClaims
        - closedClaims
        - claimFrequency
        - avgIncurredLoss
        - severity
        - lossRatio
        - claimsByLine
        - claimsByState
        - claimsTrend
        - lossRatioTrend
        - recentClaims
    StateData:
      type: object
      properties:
        stateCode:
          type: string
        stateName:
          type: string
        writtenPremium:
          type: number
        commissionRevenue:
          type: number
        policyCount:
          type: integer
        quoteToBind:
          type: number
        retentionRate:
          type: number
        lossRatio:
          type: number
        yoyGrowth:
          type: number
      required:
        - stateCode
        - stateName
        - writtenPremium
        - commissionRevenue
        - policyCount
        - quoteToBind
        - retentionRate
        - lossRatio
        - yoyGrowth
    GeographyData:
      type: object
      properties:
        states:
          type: array
          items:
            $ref: "#/components/schemas/StateData"
        totalStatesActive:
          type: integer
        topGrowthStates:
          type: array
          items:
            type: object
            properties:
              stateCode:
                type: string
              stateName:
                type: string
              growth:
                type: number
            required:
              - stateCode
              - stateName
              - growth
        concentrationRisk:
          type: array
          items:
            type: object
            properties:
              stateCode:
                type: string
              stateName:
                type: string
              sharePercent:
                type: number
            required:
              - stateCode
              - stateName
              - sharePercent
      required:
        - states
        - totalStatesActive
        - topGrowthStates
        - concentrationRisk
    TenantBranding:
      type: object
      properties:
        name:
          type: string
        copilotName:
          type: string
        industry:
          type: string
        currencySymbol:
          type: string
        dateRange:
          type: string
      required:
        - name
        - copilotName
        - industry
        - currencySymbol
        - dateRange
    KpiConfig:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        dataKey:
          type: string
        format:
          type: string
        icon:
          type: string
        copilotQuestion:
          type: string
        changeKey:
          type: string
      required:
        - id
        - label
        - dataKey
        - format
        - icon
        - copilotQuestion
    ChartYKey:
      type: object
      properties:
        key:
          type: string
        label:
          type: string
        color:
          type: string
      required:
        - key
        - label
    ChartConfig:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        type:
          type: string
        dataKey:
          type: string
        xKey:
          type: string
        yKeys:
          type: array
          items:
            $ref: "#/components/schemas/ChartYKey"
        height:
          type: integer
      required:
        - id
        - title
        - type
        - dataKey
        - xKey
        - yKeys
    TableColumn:
      type: object
      properties:
        key:
          type: string
        label:
          type: string
        format:
          type: string
      required:
        - key
        - label
    TableConfig:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        dataKey:
          type: string
        columns:
          type: array
          items:
            $ref: "#/components/schemas/TableColumn"
        copilotQuestionTemplate:
          type: string
      required:
        - id
        - title
        - dataKey
        - columns
    WidgetConfig:
      type: object
      properties:
        type:
          type: string
        id:
          type: string
        title:
          type: string
        dataKey:
          type: string
        props:
          type: object
          additionalProperties: true
      required:
        - type
        - id
        - title
        - dataKey
    SectionConfig:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        route:
          type: string
        icon:
          type: string
        kpis:
          type: array
          items:
            $ref: "#/components/schemas/KpiConfig"
        charts:
          type: array
          items:
            $ref: "#/components/schemas/ChartConfig"
        tables:
          type: array
          items:
            $ref: "#/components/schemas/TableConfig"
        widgets:
          type: array
          items:
            $ref: "#/components/schemas/WidgetConfig"
      required:
        - id
        - label
        - route
        - icon
        - kpis
        - charts
        - tables
        - widgets
    TenantClientConfig:
      type: object
      properties:
        branding:
          $ref: "#/components/schemas/TenantBranding"
        sections:
          type: array
          items:
            $ref: "#/components/schemas/SectionConfig"
        suggestedPrompts:
          type: array
          items:
            type: string
        clickToAskTemplates:
          type: object
          additionalProperties:
            type: string
      required:
        - branding
        - sections
        - suggestedPrompts
        - clickToAskTemplates
    Workspace:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        packId:
          type: string
        description:
          type: string
          nullable: true
        ownerName:
          type: string
        status:
          type: string
        readinessScore:
          type: integer
        fileCount:
          type: integer
        dashboardCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - packId
        - ownerName
        - status
        - readinessScore
        - fileCount
        - dashboardCount
        - createdAt
        - updatedAt
    CreateWorkspaceBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        packId:
          type: string
          minLength: 1
        description:
          type: string
      required:
        - name
        - packId
    Settings:
      type: object
      properties:
        id:
